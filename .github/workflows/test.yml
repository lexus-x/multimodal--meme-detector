name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Generate mock data
        run: python -m research.data.download --mock

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Training smoke test (1 epoch)
        run: python -m core.train --use_mock --epochs 1 --batch_size 8

      - name: Verify checkpoint was saved
        run: |
          CKPT=$(find research/checkpoints -name "best_model.pth" 2>/dev/null | head -1)
          if [ -z "$CKPT" ]; then
            echo "No checkpoint found!"
            exit 1
          fi
          echo "Checkpoint found: $CKPT"
