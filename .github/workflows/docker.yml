name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t meme-detector-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t meme-detector-frontend .
